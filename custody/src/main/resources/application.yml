server:
  port: 8080

spring:
  application:
    name: custody

  datasource:
    url: jdbc:mysql://localhost:3306/custody?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db
    baseline-on-migrate: true

  redis:
    host: localhost
    port: 6379
    database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1
